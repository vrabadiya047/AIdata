name: Python Automated Tests

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       sovereign_test
          POSTGRES_USER:     sovereign
          POSTGRES_PASSWORD: sovereign
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://sovereign:sovereign@localhost:5432/sovereign_test
      QDRANT_URL:   ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend-api/requirements-test.txt

      - name: Install dependencies
        run: pip install -r requirements-test.txt
        working-directory: backend-api

      - name: Run Tests
        run: pytest tests/ -v --tb=short
        working-directory: backend-api
