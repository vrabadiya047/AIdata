services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       sovereign
      POSTGRES_USER:     sovereign
      POSTGRES_PASSWORD: sovereign
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sovereign"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  neo4j:
    image: neo4j:5
    restart: unless-stopped
    ports:
      - "7474:7474"   # browser UI
      - "7687:7687"   # bolt protocol
    environment:
      NEO4J_AUTH: neo4j/sovereign2026
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL:            postgresql://sovereign:sovereign@postgres:5432/sovereign
      QDRANT_URL:              http://qdrant:6333
      SOVEREIGN_JWT_SECRET:    change-this-in-production
      SOVEREIGN_DATA_DIR:      /app/data
      SOVEREIGN_LOG_DIR:       /app/logs
      SOVEREIGN_STORAGE_DIR:   /app/storage
      SOVEREIGN_GRAPH_ENABLED: "1"
      NEO4J_URL:               bolt://neo4j:7687
      NEO4J_USERNAME:          neo4j
      NEO4J_PASSWORD:          sovereign2026
    volumes:
      - ./backend-api/data:/app/data
      - ./backend-api/logs:/app/logs
      - ./backend-api/storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      neo4j:
        condition: service_healthy

  worker:
    build: ./backend-api
    restart: unless-stopped
    command: python worker.py
    environment:
      DATABASE_URL:            postgresql://sovereign:sovereign@postgres:5432/sovereign
      QDRANT_URL:              http://qdrant:6333
      SOVEREIGN_DATA_DIR:      /app/data
      SOVEREIGN_LOG_DIR:       /app/logs
      SOVEREIGN_STORAGE_DIR:   /app/storage
      WORKER_POLL_INTERVAL:    "2"
      SOVEREIGN_GRAPH_ENABLED: "1"
      NEO4J_URL:               bolt://neo4j:7687
      NEO4J_USERNAME:          neo4j
      NEO4J_PASSWORD:          sovereign2026
    volumes:
      - ./backend-api/data:/app/data
      - ./backend-api/logs:/app/logs
      - ./backend-api/storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      neo4j:
        condition: service_healthy

volumes:
  postgres_data:
  qdrant_data:
  neo4j_data:
